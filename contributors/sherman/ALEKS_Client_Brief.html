<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Evidence Brief · LearnPlatform RCE</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.1.0/dist/tabler-icons.min.css" />
<style>
  :root{
    --color-background-primary:#ffffff; --color-background-secondary:#f4f2ec; --color-background-tertiary:#ece9e1;
    --color-background-info:#E6F1FB; --color-background-success:#E1F5EE; --color-background-warning:#FAEEDA; --color-background-danger:#FCEBEB;
    --color-text-primary:#1b1b19; --color-text-secondary:#5F5E5A; --color-text-tertiary:#888780;
    --color-text-info:#185FA5; --color-text-success:#0F6E56; --color-text-warning:#854F0B; --color-text-danger:#A32D2D;
    --color-border-tertiary:rgba(0,0,0,.12); --color-border-secondary:rgba(0,0,0,.22);
    --border-radius-md:8px; --border-radius-lg:12px;
    --font-sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--color-background-tertiary);font-family:var(--font-sans);color:var(--color-text-primary);}
  .wrap{max-width:880px;margin:0 auto;padding:24px 18px 48px;}
  .card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:16px 18px;}
  .pill{font-size:12px;font-weight:600;padding:3px 10px;border-radius:999px;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;}
  .sub{cursor:pointer;}
  .sub .detail{display:none;margin-top:8px;padding-top:8px;border-top:0.5px solid var(--color-border-tertiary);font-size:13px;color:var(--color-text-secondary);}
  .sub.open .detail{display:block;}
  .chip{cursor:pointer;font-size:13px;font-weight:500;padding:6px 12px;border-radius:999px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);}
  .chip.on{background:var(--color-text-info);color:#fff;border-color:transparent;}
  h3{font-size:15px;font-weight:600;margin:24px 2px 10px;display:flex;align-items:center;gap:7px;}
  #dropzone:hover{border-color:var(--color-text-info) !important;}
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<script>
// ── State ─────────────────────────────────────────────────────────────────
let D = null;
let uploadChecks = null;
let uploadFilename = "";
let filter = "all";

const TONE = {
  pos:{bg:"var(--color-background-success)",fg:"var(--color-text-success)",label:"Positive"},
  neu:{bg:"var(--color-background-tertiary)",fg:"var(--color-text-secondary)",label:"Neutral"},
  neg:{bg:"var(--color-background-danger)",fg:"var(--color-text-danger)",label:"Negative"},
  flag:{bg:"var(--color-background-warning)",fg:"var(--color-text-warning)",label:"Needs review"}
};
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const ROOT = document.getElementById('root');

// ── Helpers ───────────────────────────────────────────────────────────────
function getField(fields, path){
  const f = (fields||[]).find(f => f.path === path);
  return f ? f.final_value : null;
}

function numericFromStr(s){
  if(s == null) return null;
  const m = String(s).match(/[-+]?\d+\.?\d*/);
  return m ? parseFloat(m[0]) : null;
}

// ── Sanity checks ─────────────────────────────────────────────────────────
function runSanityChecks(review){
  const checks = [];
  const fields = review.fields || [];
  const subs   = review.subgroup_findings || [];
  const summary = review.summary || {};

  // Blocking: file structure
  const hasStructure = Array.isArray(fields) && review.source_filename != null;
  checks.push({
    label: "Valid Spot-Check export format",
    type:  hasStructure ? 'ok' : 'error',
    detail:"File is missing required keys (fields, source_filename). Make sure this was exported from the RCE Spot-Check & Sign-off tool."
  });

  // Blocking: critical fields present
  const criticalPaths = ['product_name','district_name','effect_size_raw','overall_statistical_significance'];
  const missingCritical = criticalPaths.filter(p => !fields.some(f => f.path === p));
  checks.push({
    label: "Critical fields present",
    type:  missingCritical.length === 0 ? 'ok' : 'error',
    detail:`Missing required fields: ${missingCritical.join(', ')}. The brief cannot be populated without them.`
  });

  // Warning: reviewer name
  checks.push({
    label: "Reviewer name included",
    type:  (review.reviewer && String(review.reviewer).trim()) ? 'ok' : 'warn',
    detail:"No reviewer name found. Add your name in the Spot-Check tool and re-export, or proceed without it."
  });

  // Warning: at least one verified field
  const verifiedCount = summary.verified || 0;
  checks.push({
    label: `Fields verified (${verifiedCount} of ${summary.total||fields.length+subs.length})`,
    type:  verifiedCount > 0 ? 'ok' : 'warn',
    detail:"No fields were marked as verified — did you export before reviewing? The brief will use extracted (unverified) values."
  });

  // Warning: open ambiguity flags
  const openFlags = [
    ...fields.filter(f => f.tier === 'flag' && f.status === 'unreviewed'),
    ...subs.filter(s => s.tier === 'flag' && s.status === 'unreviewed')
  ];
  checks.push({
    label: openFlags.length === 0 ? "Ambiguity flags resolved" : `${openFlags.length} ambiguity flag(s) still open`,
    type:  openFlags.length === 0 ? 'ok' : 'warn',
    detail:`${openFlags.length} visual ambiguity flag(s) were not resolved in the Spot-Check tool. Affected values will appear as "—" in the brief.`
  });

  // Warning: fields needing fix
  const needsFix = summary.needs_fix || 0;
  if(needsFix > 0){
    checks.push({
      label: `${needsFix} field(s) marked "needs fix"`,
      type:  'warn',
      detail:"Corrected values from the Spot-Check tool are used in the brief where provided; otherwise the original extracted value is shown."
    });
  }

  return checks;
}

// ── Field mapping ─────────────────────────────────────────────────────────
function mapToBrief(review){
  const fields = review.fields || [];
  const G = p => getField(fields, p);

  // Compliance rate: "0.27 (27%)" → 27
  const compRaw  = G('usage.usage_compliance_rate') || '';
  const compRate = numericFromStr(compRaw) || 0;
  const compPct  = compRate <= 1 ? Math.round(compRate * 100) : Math.round(compRate);
  const nMax     = parseInt(G('sample_size_max')) || 0;

  // Usage notes: "486 minutes; 97% used"
  const usageNotes = G('usage.usage_notes') || '';
  const avgMinM = usageNotes.match(/(\d+)\s*min/i);
  const usedPctM = usageNotes.match(/(\d+)\s*%\s*used/i);
  const avgMin  = avgMinM  ? parseInt(avgMinM[1])  : null;
  const usedPct = usedPctM ? parseInt(usedPctM[1]) : null;

  // ESSA: "3 (Level III)" → "Level III · Promising Evidence"
  const essaTierRaw = G('essa_tier') || '';
  const essaLabel   = G('essa_tier_label') || '';
  const essaMap = {'1':'Strong Evidence','2':'Moderate Evidence','3':'Promising Evidence','4':'Demonstrates a Rationale'};
  const essaNum = (essaTierRaw.match(/\d/) || [])[0] || '';
  const essaFull = essaLabel
    ? (essaMap[essaNum] ? `${essaLabel} · ${essaMap[essaNum]}` : essaLabel)
    : (essaMap[essaNum] || '');

  // Effect size type → human-readable
  const estRaw = G('effect_size_type') || '';
  const estMap = {'pearson_r':"Pearson's r",'hedges_g':"Hedge's g",'partial correlation r':"Pearson's r",'not_reported':''};
  const estLabel = estMap[estRaw] || estRaw || 'effect size';

  // Grade levels → "Grade 6" or "Grades 3, 4, 5"
  const gradesRaw = G('grade_levels') || '';
  const gradesArr = Array.isArray(gradesRaw)
    ? gradesRaw
    : String(gradesRaw).split(/[,\s]+/).filter(Boolean);
  const gradeLabel = gradesArr.length > 1
    ? 'Grades ' + gradesArr.join(', ')
    : (gradesArr[0] ? 'Grade ' + gradesArr[0] : '');

  // Subgroup category display names
  const catNames = {
    school:'School', grade_level:'Grade Level', ell:'ELL Status',
    gender:'Gender', race_ethnicity:'Race/Ethnicity', frl_status:'FRL Status',
    ethnicity:'Race/Ethnicity', custom:'Subgroup'
  };
  const toneMap = {positive:'pos', neutral:'neu', negative:'neg', not_reported:'flag', mixed:'neu'};

  const subgroups = (review.subgroup_findings || []).map(s => {
    const nVal  = (s.n && s.n !== '—') ? parseInt(s.n) : null;
    const catKey = String(s.subgroup_category || '').toLowerCase();
    const cat = catNames[catKey] || s.subgroup_category_custom || s.subgroup_category || '';
    return {
      cat,
      val:       s.subgroup_value || '',
      tone:      toneMap[s.effectiveness] || 'neu',
      es:        s.effect_size || '—',
      ci:        s.ci || '—',
      n:         nVal,
      sig:       s.significance === 'significant',
      note:      s.reviewer_note || s.source_note || '',
      flagSmallN: nVal != null && nVal < 50
    };
  });

  // Dynamic discussion questions
  const questions = [];
  if(compPct > 0 && compPct < 50){
    questions.push({
      q:    "What barriers are keeping usage below the recommended level, and how do we raise reach?",
      trig: `Only ${compPct}% of students met the recommended dosage.`
    });
    questions.push({
      q:    "Should fidelity and usage expectations be communicated more explicitly to classroom teachers?",
      trig: "High effect at low adoption — the gap is reach, not the tool's effectiveness."
    });
  }
  const posSig = subgroups.filter(s => s.tone === 'pos' && s.sig);
  if(posSig.length){
    questions.push({
      q:    "How can we replicate the practices driving gains for our highest-gaining subgroups?",
      trig: `Positive, significant gains for: ${posSig.map(s=>s.val).slice(0,3).join('; ')}${posSig.length>3?'…':''}.`
    });
  }
  if(subgroups.some(s => s.flagSmallN)){
    questions.push({
      q:    "How can we expand participation in underrepresented subgroups to get more reliable estimates?",
      trig: "Some subgroups have small samples (n < 50), limiting confidence in those estimates."
    });
  }
  if(!questions.length){
    questions.push({
      q:    "What combination of classroom practice and student support is producing these results?",
      trig: "Understanding the drivers will help sustain and scale the gains."
    });
  }

  return {
    product:       G('product_name') || 'Unknown Product',
    district:      G('district_name') || '',
    subject:       G('outcome_measure') || '',
    grade:         gradeLabel,
    period:        [G('report_period'), G('report_period_label')].filter(Boolean).join(' · '),
    essa:          essaFull,
    effect_size:   G('effect_size_raw') || '—',
    effect_type:   estLabel,
    ci:            '—',
    n:             nMax,
    significant:   G('overall_statistical_significance') === 'significant',
    used_pct:      usedPct,
    avg_minutes:   avgMin,
    dosage:        G('usage.usage_compliance_threshold') || '',
    met_dosage_pct: compPct,
    met_dosage_n:  (compRate && nMax) ? Math.round(compRate * nMax) : null,
    headline:      G('summary_key_findings') || '',
    reviewer:      review.reviewer || '',
    reviewed:      (review.reviewed_at || '').slice(0, 10),
    subgroups,
    questions
  };
}

// ── Upload handling ───────────────────────────────────────────────────────
function handleFile(file){
  uploadFilename = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    let review;
    try { review = JSON.parse(e.target.result); }
    catch(err){
      uploadChecks = { review: null, checks:[{label:'Valid JSON', type:'error', detail:'Could not parse file: '+err.message}] };
      renderUpload(); return;
    }
    const checks = runSanityChecks(review);
    const hasError = checks.some(c => c.type === 'error');
    uploadChecks = { review: hasError ? null : review, checks };
    renderUpload();
  };
  reader.readAsText(file);
}

// ── Upload screen ─────────────────────────────────────────────────────────
function renderUpload(){
  const checks   = uploadChecks ? uploadChecks.checks  : null;
  const review   = uploadChecks ? uploadChecks.review  : null;
  const hasError = checks ? checks.some(c => c.type === 'error') : false;
  const hasWarn  = checks ? checks.some(c => c.type === 'warn')  : false;

  const checkIcon  = {ok:'ti-circle-check', warn:'ti-alert-triangle', error:'ti-circle-x'};
  const checkColor = {ok:'var(--color-text-success)', warn:'var(--color-text-warning)', error:'var(--color-text-danger)'};

  const checkRows = checks ? checks.map(c => `
    <div style="display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:0.5px solid var(--color-border-tertiary);">
      <i class="ti ${checkIcon[c.type]}" style="color:${checkColor[c.type]};font-size:17px;flex:none;margin-top:1px;"></i>
      <div>
        <div style="font-size:13px;font-weight:500;">${esc(c.label)}</div>
        ${c.type !== 'ok' ? `<div style="font-size:12px;color:var(--color-text-secondary);margin-top:2px;line-height:1.45;">${esc(c.detail)}</div>` : ''}
      </div>
    </div>`).join('') : '';

  ROOT.innerHTML = `
  <div style="max-width:540px;margin:48px auto 0;padding:0 4px;">

    <!-- Title -->
    <div style="text-align:center;margin-bottom:28px;">
      <span style="width:54px;height:54px;border-radius:15px;background:var(--color-background-info);color:var(--color-text-info);display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px;">
        <i class="ti ti-chart-arcs" style="font-size:30px;"></i>
      </span>
      <div style="font-size:22px;font-weight:700;">Evidence Brief</div>
      <div style="font-size:14px;color:var(--color-text-secondary);margin-top:5px;">
        Upload the verified JSON exported from the Spot-Check tool.
      </div>
    </div>

    ${!checks ? `
    <!-- Drop zone -->
    <label id="dropzone" style="display:block;border:1.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:40px 24px;text-align:center;cursor:pointer;background:var(--color-background-primary);transition:border-color .15s;">
      <i class="ti ti-upload" style="font-size:38px;color:var(--color-text-tertiary);display:block;margin-bottom:12px;"></i>
      <div style="font-size:16px;font-weight:500;margin-bottom:5px;">Drop your verified JSON here</div>
      <div style="font-size:13px;color:var(--color-text-secondary);">or click to browse</div>
      <div style="font-size:12px;color:var(--color-text-tertiary);margin-top:8px;">Exported from <em>RCE Spot-Check &amp; Sign-off</em></div>
    </label>
    <input type="file" id="json-upload" accept=".json" style="display:none;" />
    ` : `
    <!-- File identified -->
    <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 14px;display:flex;align-items:center;gap:9px;margin-bottom:14px;">
      <i class="ti ti-file-type-json" style="font-size:20px;color:var(--color-text-info);flex:none;"></i>
      <span style="font-size:13px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(uploadFilename)}</span>
      <button id="reupload" style="font-size:12px;color:var(--color-text-info);background:none;border:none;cursor:pointer;padding:0;white-space:nowrap;display:flex;align-items:center;gap:4px;">
        <i class="ti ti-refresh"></i> Different file
      </button>
    </div>

    <!-- Checks -->
    <div class="card" style="margin-bottom:14px;">
      <div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--color-text-tertiary);margin-bottom:6px;">File check</div>
      ${checkRows}
    </div>

    ${!hasError ? `
    <button id="load-btn" style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;font-size:15px;font-weight:600;padding:14px 20px;border-radius:var(--border-radius-lg);border:none;background:var(--color-text-info);color:#fff;">
      <i class="ti ti-arrow-right" style="font-size:20px;"></i>
      Load Evidence Brief${hasWarn ? ' — with warnings' : ''}
    </button>
    ` : `
    <div style="background:var(--color-background-danger);border-radius:var(--border-radius-md);padding:12px 14px;font-size:13px;color:var(--color-text-danger);line-height:1.5;margin-bottom:12px;">
      <strong>Cannot load:</strong> resolve the errors above in the Spot-Check tool, then re-export.
    </div>
    <label style="display:inline-flex;align-items:center;gap:7px;cursor:pointer;font-size:14px;font-weight:500;padding:10px 16px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);">
      <i class="ti ti-upload" style="font-size:17px;"></i>Try a different file
      <input type="file" id="json-upload-retry" accept=".json" style="display:none;" />
    </label>
    `}
    `}
  </div>`;

  // Wire file inputs
  const up = document.getElementById('json-upload');
  if(up) up.onchange = e => { if(e.target.files[0]) handleFile(e.target.files[0]); };
  const upRetry = document.getElementById('json-upload-retry');
  if(upRetry) upRetry.onchange = e => { if(e.target.files[0]) handleFile(e.target.files[0]); };

  // Re-upload button
  const reup = document.getElementById('reupload');
  if(reup){ reup.onclick = () => { uploadChecks=null; uploadFilename=""; renderUpload(); }; }

  // Load button
  const loadBtn = document.getElementById('load-btn');
  if(loadBtn && review){ loadBtn.onclick = () => { D = mapToBrief(review); render(); }; }

  // Drag and drop
  const dz = document.getElementById('dropzone');
  if(dz){
    dz.ondragover  = e => { e.preventDefault(); dz.style.borderColor='var(--color-text-info)'; };
    dz.ondragleave = () => { dz.style.borderColor=''; };
    dz.ondrop      = e => { e.preventDefault(); dz.style.borderColor=''; const f=e.dataTransfer.files[0]; if(f) handleFile(f); };
    dz.onclick     = () => document.getElementById('json-upload').click();
  }
}

// ── Brief rendering ───────────────────────────────────────────────────────
function metric(value, label, icon, accent){
  return `<div class="card" style="flex:1;min-width:150px;padding:14px 16px;">
    <div style="display:flex;align-items:center;gap:7px;color:${accent||'var(--color-text-info)'};font-size:13px;">
      <i class="ti ${icon}"></i>${esc(label)}</div>
    <div style="font-size:24px;font-weight:600;margin-top:6px;">${value}</div></div>`;
}

function render(){
  if(!D){ renderUpload(); return; }

  const subs = D.subgroups.filter(s =>
    filter==="all" ? true : (filter==="flag" ? s.tone==="flag" : s.tone===filter)
  );

  const subCards = subs.map((s,i) => {
    const t = TONE[s.tone]; const idx = D.subgroups.indexOf(s);
    const nTxt  = s.n != null ? `n = ${s.n}` : "n not reported";
    const small = s.flagSmallN ? ` · <span style="color:var(--color-text-warning);">small sample</span>` : "";
    const detail = s.tone==="flag"
      ? esc(s.note||"")
      : `Effect size ${esc(s.es)} (${esc(D.effect_type||'r')}), 95% CI ${esc(s.ci)}, ${nTxt}. ${s.sig?'Statistically significant — the interval excludes 0.':'Not statistically significant — the interval includes 0.'}${small}`;
    return `<div class="sub card" data-i="${idx}" style="border-left:3px solid ${t.fg};margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;">
        <div>
          <div style="font-size:12px;color:var(--color-text-tertiary);">${esc(s.cat)}</div>
          <div style="font-size:15px;font-weight:500;">${esc(s.val)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:13px;color:var(--color-text-secondary);">${s.es!=='—'?('r = '+esc(s.es)):''}</span>
          <span class="pill" style="background:${t.bg};color:${t.fg};">${t.label}</span>
          <i class="ti ti-chevron-down" style="color:var(--color-text-tertiary);"></i>
        </div>
      </div>
      <div class="detail">${detail}</div>
    </div>`;
  }).join('');

  const chip = (id,label) => `<span class="chip ${filter===id?'on':''}" data-f="${id}">${esc(label)}</span>`;

  const qRows = D.questions.map((r,i) => `
    <div style="padding:11px 0;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;gap:11px;align-items:baseline;">
      <span style="flex:none;width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:12px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;">${i+1}</span>
      <div>
        <div style="font-size:14px;font-weight:500;line-height:1.4;">${esc(r.q)}</div>
        <div style="font-size:12px;color:var(--color-text-tertiary);margin-top:3px;">${esc(r.trig)}</div>
      </div>
    </div>`).join('');

  ROOT.innerHTML = `
  <!-- Header -->
  <div class="card" style="margin-bottom:16px;">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="width:36px;height:36px;border-radius:9px;background:var(--color-background-info);color:var(--color-text-info);display:inline-flex;align-items:center;justify-content:center;">
          <i class="ti ti-chart-arcs" style="font-size:21px;"></i>
        </span>
        <div>
          <div style="font-size:18px;font-weight:600;">${esc(D.product)} — Evidence Brief</div>
          <div style="font-size:12px;color:var(--color-text-tertiary);">${esc(D.district)} · ${esc(D.subject)} · ${esc(D.grade)} · ${esc(D.period)}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        ${D.essa ? `<span class="pill" style="background:var(--color-background-success);color:var(--color-text-success);"><i class="ti ti-award"></i>${esc(D.essa)}</span>` : ''}
        <button id="reload-btn" title="Load a different file" style="display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--color-text-tertiary);background:none;border:0.5px solid var(--color-border-secondary);border-radius:999px;padding:5px 11px;cursor:pointer;">
          <i class="ti ti-upload" style="font-size:14px;"></i>Load different file
        </button>
      </div>
    </div>
    ${D.headline ? `<div style="margin-top:14px;padding:13px 15px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);font-size:15px;line-height:1.55;">${esc(D.headline)}</div>` : ''}
  </div>

  <!-- Key metrics -->
  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px;">
    ${metric(esc(D.effect_size), "Effect size (" + esc(D.effect_type) + ")", "ti-trending-up", "var(--color-text-success)")}
    ${D.n ? metric(D.n.toLocaleString(), esc(D.grade||"Students"), "ti-users") : ''}
    ${D.used_pct != null ? metric(D.used_pct+"%", "Used the product", "ti-plug-connected") : ''}
    ${D.met_dosage_pct != null ? metric(D.met_dosage_pct+"%", "Met usage goal", "ti-target", "var(--color-text-warning)") : ''}
  </div>
  <div style="font-size:12px;color:var(--color-text-tertiary);margin:0 2px 4px;">
    ${D.ci !== '—' ? `95% CI ${esc(D.ci)} · ` : ''}${D.significant?'statistically significant':'not significant'}${D.avg_minutes ? ` · avg ${D.avg_minutes} min` : ''}${D.dosage ? ` vs. recommended ${esc(D.dosage)}` : ''}
  </div>

  ${(D.met_dosage_pct != null && D.met_dosage_pct < 50) ? `
  <h3><i class="ti ti-alert-triangle" style="color:var(--color-text-warning);"></i>The headline tension</h3>
  <div class="card" style="border-left:3px solid var(--color-text-warning);">
    <div style="font-size:14px;line-height:1.6;">
      <strong>${esc(D.product)}</strong> shows a positive, significant effect —
      but only <strong>${D.met_dosage_pct}%</strong> of students${D.met_dosage_n ? ` (${D.met_dosage_n})` : ''} reached the recommended dosage${D.used_pct ? `, even though ${D.used_pct}% logged in` : ''}.
      This is a <strong>high-impact, low-reach</strong> pattern: the opportunity is widening adoption, not replacing the tool.
    </div>
  </div>` : ''}

  <!-- Subgroups -->
  <h3><i class="ti ti-users-group" style="color:var(--color-text-info);"></i>Who benefited <span style="font-weight:400;font-size:12px;color:var(--color-text-tertiary);">— tap a row for detail</span></h3>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
    ${chip("all","All")} ${chip("pos","Positive")} ${chip("neu","Neutral")} ${chip("flag","Needs review")}
  </div>
  ${subCards || '<div class="card" style="color:var(--color-text-tertiary);font-size:13px;">No subgroups match this filter.</div>'}

  ${D.questions.length ? `
  <h3><i class="ti ti-list-check" style="color:var(--color-text-info);"></i>Discussion agenda</h3>
  <div class="card">
    <div style="font-size:12px;color:var(--color-text-tertiary);margin-bottom:4px;">Questions this evidence raises for your district team (LearnPlatform Appendix C).</div>
    ${qRows}
  </div>` : ''}

  <!-- Provenance -->
  <div style="text-align:center;font-size:11px;color:var(--color-text-tertiary);margin-top:18px;line-height:1.7;">
    Verified extraction${D.reviewer ? ` · reviewed by ${esc(D.reviewer)}` : ''}${D.reviewed ? ` on ${esc(D.reviewed)}` : ''} · analysis: partial correlation, significance from 95% CI.<br>
    ${D.subgroups.some(s=>s.tone==='flag') ? 'One or more subgroups flagged "needs review" were excluded from conclusions. ' : ''}Figures sourced from the LearnPlatform RCE for ${esc(D.product)}.
  </div>`;

  ROOT.querySelectorAll('.sub').forEach(el => el.onclick = () => el.classList.toggle('open'));
  ROOT.querySelectorAll('[data-f]').forEach(c => c.onclick = () => { filter = c.dataset.f; render(); });
  document.getElementById('reload-btn').onclick = () => { D=null; uploadChecks=null; uploadFilename=""; filter="all"; renderUpload(); };
}

render();
</script>
</body>
</html>
